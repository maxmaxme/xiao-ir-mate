esphome:
  name: xiao-ir-mate
  name_add_mac_suffix: true
  friendly_name: Midea AC

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

logger:

# No encryption on the API for now: the device may already be added to HA on the
# stock firmware, and a key would force re-pairing. Add `encryption:` later.
api:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback AP if Wi-Fi is unreachable.
  ap:
    ssid: "Xiao IR Mate Fallback"
    password: !secret ap_password

captive_portal:

# IR blaster on the XIAO IR Mate carrier board.
remote_transmitter:
  id: ir_tx
  pin: GPIO3
  carrier_duty_percent: 50%

# IR receiver — lets the climate component sync state when the physical remote
# is used. midea_ir understands both Midea and Coolix protocols on receive.
# (Add `dump: all` temporarily if you ever need to capture a raw code from logs.)
remote_receiver:
  id: ir_rx
  pin:
    number: GPIO4
    inverted: true

# Pull this room's temperature from a Home Assistant sensor so the climate
# entity reports current_temperature. The entity_id lives in secrets.yaml
# (per-device): set it to the right room's sensor before flashing each unit.
# internal: true — used only to feed the climate; not re-exposed back to HA.
sensor:
  - platform: homeassistant
    id: room_temp
    entity_id: !secret room_temp_entity
    internal: true
  - platform: homeassistant
    id: room_humidity
    entity_id: !secret room_humidity_entity
    internal: true

climate:
  - platform: midea_ir
    name: "Midea AC"
    transmitter_id: ir_tx
    receiver_id: ir_rx
    use_fahrenheit: false
    supports_cool: true
    supports_heat: true
    sensor: room_temp
    humidity_sensor: room_humidity

# LED/display toggle: midea_ir doesn't expose it, so we send the raw Midea
# "special" frame directly. Code is the proven `midea:button=led` command
# (vendor 0xB5, payload 0xF5/0xA5 — a 48-bit Midea frame sent twice) carried
# over from the previous Flipper-based setup (flipper_rc midea_encode).
button:
  - platform: template
    name: "AC Display Toggle"
    icon: mdi:lightbulb-on-outline
    on_press:
      - remote_transmitter.transmit_raw:
          carrier_frequency: 38kHz
          code: [4500, -4500, 560, -1690, 560, -560, 560, -1690, 560, -1690, 560, -560,
                 560, -1690, 560, -560, 560, -1690, 560, -560, 560, -1690, 560, -560,
                 560, -560, 560, -1690, 560, -560, 560, -1690, 560, -560, 560, -1690,
                 560, -1690, 560, -1690, 560, -1690, 560, -560, 560, -1690, 560, -560,
                 560, -1690, 560, -560, 560, -560, 560, -560, 560, -560, 560, -1690,
                 560, -560, 560, -1690, 560, -560, 560, -1690, 560, -560, 560, -1690,
                 560, -560, 560, -560, 560, -1690, 560, -560, 560, -1690, 560, -560,
                 560, -1690, 560, -560, 560, -1690, 560, -1690, 560, -560, 560, -1690,
                 560, -560, 560, -5100, 4500, -4500, 560, -1690, 560, -560, 560, -1690,
                 560, -1690, 560, -560, 560, -1690, 560, -560, 560, -1690, 560, -560,
                 560, -1690, 560, -560, 560, -560, 560, -1690, 560, -560, 560, -1690,
                 560, -560, 560, -1690, 560, -1690, 560, -1690, 560, -1690, 560, -560,
                 560, -1690, 560, -560, 560, -1690, 560, -560, 560, -560, 560, -560,
                 560, -560, 560, -1690, 560, -560, 560, -1690, 560, -560, 560, -1690,
                 560, -560, 560, -1690, 560, -560, 560, -560, 560, -1690, 560, -560,
                 560, -1690, 560, -560, 560, -1690, 560, -560, 560, -1690, 560, -1690,
                 560, -560, 560, -1690, 560, -560, 560]
